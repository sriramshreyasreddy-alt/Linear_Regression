Product Requirements Document (PRD)
Project Title

Next-Day Stock Closing Price Prediction Using Linear Regression

Version: 1.0

Project Type: Machine Learning • Data Science • Financial Analytics

Dataset: Kaggle NASDAQ-100 Historical Stock Dataset

Primary Stock (v1): Apple Inc. (AAPL)

1. Executive Summary

This project aims to build an end-to-end machine learning application capable of predicting Apple's next trading day's closing stock price using historical market data and technical indicators.

The project demonstrates the complete machine learning lifecycle:

Data Collection
Data Cleaning
Exploratory Data Analysis
Feature Engineering
Model Training
Model Evaluation
Deployment
Documentation

The final deliverable is an interactive Streamlit web application where users can visualize stock data and obtain next-day closing price predictions.

2. Problem Statement

Financial markets generate enormous amounts of historical data every trading day.

Although stock prices are influenced by numerous factors, historical price movements and trading activity often exhibit measurable patterns.

This project investigates whether a Linear Regression model can learn these patterns and accurately estimate the next trading day's closing price.

3. Objectives
Primary Objective

Develop a Linear Regression model capable of predicting the next day's closing stock price for Apple Inc.

