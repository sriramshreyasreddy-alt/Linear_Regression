14. Risks
Risk	Mitigation
Overfitting	Use train/test split and regular evaluation
Data leakage	Use chronological splits and lagged features only
Missing values	Proper preprocessing and validation
Poor predictive performance	Improve feature engineering and compare with advanced models in future versions
